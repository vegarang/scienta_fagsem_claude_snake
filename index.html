<!DOCTYPE html>
<html lang="en" data-theme="classic" data-mode="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
  </head>
  <body>
    <header id="page-header">
      <h1 id="page-title">Play Snake</h1>
      <div id="theme-controls">
        <ul id="theme-swatches">
          <li><button class="theme-swatch active" data-theme-id="classic" aria-label="Classic" style="--swatch-color:#00ff88"></button></li>
          <li><button class="theme-swatch" data-theme-id="ocean"   aria-label="Ocean"   style="--swatch-color:#00e5ff"></button></li>
          <li><button class="theme-swatch" data-theme-id="sunset"  aria-label="Sunset"  style="--swatch-color:#ff7733"></button></li>
          <li><button class="theme-swatch" data-theme-id="forest"  aria-label="Forest"  style="--swatch-color:#88cc44"></button></li>
          <li><button class="theme-swatch" data-theme-id="minimal" aria-label="Minimal" style="--swatch-color:#aaaaaa"></button></li>
        </ul>
        <button id="mode-toggle" aria-label="Toggle light/dark mode">🌙</button>
      </div>
    </header>
    <p id="game-intro">
      Guide the snake to eat food, grow longer, and rack up points.<br>
      Arrow keys or WASD to steer &middot; Space to start, pause, or restart
    </p>
    <div id="stats">
      <div class="stat">Score<span class="stat-value" id="score" data-testid="score">0</span></div>
      <div class="stat">Difficulty<span class="stat-value" id="stat-difficulty">Easy</span></div>
    </div>
    <canvas id="game-canvas" data-testid="game-canvas"></canvas>
    <div id="hud">
      <div id="difficulty">
        <select id="difficulty-select" aria-label="Difficulty">
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>
      </div>
      <div id="size">
        <select id="size-select" aria-label="Size">
          <option value="small">Small</option>
          <option value="medium">Medium</option>
          <option value="large">Large</option>
        </select>
      </div>
    </div>
    <section id="name-entry" hidden>
      <p>Enter your name for the scoreboard:</p>
      <div id="name-entry-controls">
        <input id="name-input" type="text" placeholder="Your name" maxlength="20" autocomplete="off">
        <button id="name-submit">Add to Scoreboard</button>
        <button id="name-skip">Skip</button>
      </div>
    </section>
    <section id="scoreboard">
      <h2>Scoreboard</h2>
      <table id="score-table">
        <thead><tr><th>#</th><th>Name</th><th>Score</th><th>Date</th></tr></thead>
        <tbody id="score-body"></tbody>
      </table>
      <p id="no-scores">No scores yet. Play a game!</p>
    </section>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
