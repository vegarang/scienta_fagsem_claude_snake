<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <style>
      body {
        margin: 0;
        background: #1a1a1a;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        gap: 8px;
        font-family: monospace;
        color: #fff;
      }
      canvas {
        background: #000;
      }
      #hud {
        display: flex;
        gap: 24px;
        font-size: 14px;
        align-items: center;
      }
      #difficulty {
        display: flex;
        gap: 6px;
      }
      #difficulty button {
        background: #333;
        color: #aaa;
        border: 1px solid #555;
        border-radius: 4px;
        padding: 3px 10px;
        font-family: monospace;
        font-size: 13px;
        cursor: pointer;
      }
      #difficulty button:hover {
        background: #444;
        color: #fff;
      }
      #difficulty button.active {
        background: #4caf50;
        color: #fff;
        border-color: #4caf50;
      }
    </style>
  </head>
  <body>
    <div id="hud">
      <span>Score: <span id="score" data-testid="score">0</span></span>
      <div id="difficulty">
        <button data-level="easy" class="active">Easy</button>
        <button data-level="medium">Medium</button>
        <button data-level="hard">Hard</button>
      </div>
    </div>
    <canvas id="game-canvas" width="400" height="400" data-testid="game-canvas"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
