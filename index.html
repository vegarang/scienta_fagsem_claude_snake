<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <style>
      body {
        margin: 0;
        background: #1a1a1a;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        gap: 8px;
        font-family: monospace;
        color: #fff;
      }
      canvas {
        background: #000;
      }
      #hud {
        display: flex;
        gap: 24px;
        font-size: 14px;
        align-items: center;
      }
      #difficulty {
        display: flex;
        gap: 6px;
      }
      #difficulty button {
        background: #333;
        color: #aaa;
        border: 1px solid #555;
        border-radius: 4px;
        padding: 3px 10px;
        font-family: monospace;
        font-size: 13px;
        cursor: pointer;
      }
      #difficulty button:hover {
        background: #444;
        color: #fff;
      }
      #difficulty button.active {
        background: #4caf50;
        color: #fff;
        border-color: #4caf50;
      }
      #size {
        display: flex;
        gap: 6px;
      }
      #size button {
        background: #333;
        color: #aaa;
        border: 1px solid #555;
        border-radius: 4px;
        padding: 3px 10px;
        font-family: monospace;
        font-size: 13px;
        cursor: pointer;
      }
      #size button:hover {
        background: #444;
        color: #fff;
      }
      #size button.active {
        background: #4caf50;
        color: #fff;
        border-color: #4caf50;
      }
      #name-entry {
        background: #222;
        border: 1px solid #444;
        border-radius: 6px;
        padding: 10px 16px;
        text-align: center;
        font-size: 13px;
        color: #ccc;
      }
      #name-entry p {
        margin: 0 0 8px;
      }
      #name-entry-controls {
        display: flex;
        gap: 6px;
        justify-content: center;
        align-items: center;
      }
      #name-input {
        background: #333;
        color: #fff;
        border: 1px solid #555;
        border-radius: 4px;
        padding: 3px 8px;
        font-family: monospace;
        font-size: 13px;
        outline: none;
      }
      #name-input:focus {
        border-color: #4caf50;
      }
      #name-submit, #name-skip {
        background: #333;
        color: #aaa;
        border: 1px solid #555;
        border-radius: 4px;
        padding: 3px 10px;
        font-family: monospace;
        font-size: 13px;
        cursor: pointer;
      }
      #name-submit:hover {
        background: #4caf50;
        color: #fff;
        border-color: #4caf50;
      }
      #name-skip:hover {
        background: #444;
        color: #fff;
      }
      #scoreboard {
        max-width: 400px;
        width: 100%;
        text-align: center;
        font-size: 13px;
      }
      #scoreboard h2 {
        margin: 0 0 6px;
        font-size: 14px;
        color: #aaa;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      #score-table {
        width: 100%;
        border-collapse: collapse;
        font-family: monospace;
        font-size: 12px;
      }
      #score-table th, #score-table td {
        padding: 4px 8px;
        text-align: left;
        border-bottom: 1px solid #333;
      }
      #score-table th {
        color: #888;
      }
      #no-scores {
        color: #555;
        font-size: 12px;
        margin: 4px 0 0;
      }
    </style>
  </head>
  <body>
    <div id="hud">
      <span>Score: <span id="score" data-testid="score">0</span></span>
      <div id="difficulty">
        <button data-level="easy" class="active">Easy</button>
        <button data-level="medium">Medium</button>
        <button data-level="hard">Hard</button>
      </div>
      <div id="size">
        <button data-size="small" class="active">Small</button>
        <button data-size="medium">Medium</button>
        <button data-size="large">Large</button>
      </div>
    </div>
    <canvas id="game-canvas" data-testid="game-canvas"></canvas>
    <section id="name-entry" hidden>
      <p>Enter your name for the scoreboard:</p>
      <div id="name-entry-controls">
        <input id="name-input" type="text" placeholder="Your name" maxlength="20" autocomplete="off">
        <button id="name-submit">Add to Scoreboard</button>
        <button id="name-skip">Skip</button>
      </div>
    </section>
    <section id="scoreboard">
      <h2>Scoreboard</h2>
      <table id="score-table">
        <thead><tr><th>#</th><th>Name</th><th>Score</th><th>Date</th></tr></thead>
        <tbody id="score-body"></tbody>
      </table>
      <p id="no-scores">No scores yet. Play a game!</p>
    </section>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
